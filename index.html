<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI OS - Jarvis Mode</title>

<link rel="manifest" href="/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#111;color:white;font-family:Arial}
.sidebar{width:220px;background:#000;height:100vh;float:left;overflow:auto}
.sidebar button{width:100%;padding:10px;background:#111;color:white;border:none}
.main{margin-left:220px;padding:10px}
.panel{display:none}
textarea,input{width:90%;margin:5px}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('chat')">💬 Chat</button>
<button onclick="show('search')">🌐 Search</button>
<button onclick="show('qr')">🔳 QR</button>
<button onclick="show('translate')">🌐 Translate</button>
<button onclick="show('camera')">📷 Camera</button>
<button onclick="show('agents')">🤖 Agents</button>
<button onclick="show('swarm')">🧠 Swarm</button>
<button onclick="show('api')">🧪 API</button>
<button onclick="show('files')">📁 Files</button>
<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('brain')">🧠 Brain</button>
<button onclick="show('pay')">💳 Pay</button>
</div>

<div class="main">

<h3>Login</h3>
<input id="user" placeholder="Name">
<input id="pin" placeholder="PIN">
<button onclick="login()">Login</button>

<!-- CHAT -->
<div id="chat" class="panel">
<h3>ChatGPT</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</div>

<!-- SEARCH -->
<div id="search" class="panel">
<input id="q"><button onclick="search()">Search</button>
<div id="results"></div>
<pre id="summary"></pre>
</div>

<!-- QR -->
<div id="qr" class="panel">
<input id="qrText"><button onclick="makeQR()">Generate</button>
<div id="qrOut"></div>
</div>

<!-- TRANSLATE -->
<div id="translate" class="panel">
<textarea id="t"></textarea>
<button onclick="translate()">Translate</button>
<button onclick="voiceT()">🎤</button>
<pre id="tOut"></pre>
</div>

<!-- CAMERA -->
<div id="camera" class="panel">
<select id="camSelect"></select>
<button onclick="loadCams()">Load Cameras</button>
<br><br>
<video id="video" autoplay width="300"></video><br>
<button onclick="startCam()">Start</button>
<button onclick="snap()">Scan + Translate</button>
<pre id="camText"></pre>
<pre id="camTrans"></pre>
</div>

<!-- AGENT ACTION -->
<div id="agents" class="panel">
<input id="task" placeholder="e.g. google AI tools">
<button onclick="runAgent()">Run Agent</button>
<pre id="agentOut"></pre>
</div>

<!-- SWARM -->
<div id="swarm" class="panel">
<input id="goal" placeholder="Goal">
<button onclick="runSwarm()">Run Swarm</button>
<pre id="swarmOut"></pre>
</div>

<!-- API -->
<div id="api" class="panel">
<input id="url" value="/ai">
<textarea id="body">{ "prompt":"Hello","userName":"William" }</textarea>
<button onclick="api()">Send</button>
<pre id="out"></pre>
</div>

<!-- FILES -->
<div id="files" class="panel">
<input type="file" id="f">
<button onclick="upload()">Upload</button>
<button onclick="list()">List</button>
<div id="fileList"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel">
<button onclick="loadStats()">Load Stats</button>
<pre id="stats"></pre>
</div>

<!-- AI BRAIN -->
<div id="brain" class="panel">
<textarea id="brainCode"></textarea>
<button onclick="runBrain()">Inject Upgrade</button>
</div>

<!-- PAY -->
<div id="pay" class="panel">
<button onclick="buy()">Upgrade</button>
</div>

</div>

<script>
let userName="";

// NAV
function show(id){
 document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
 document.getElementById(id).style.display="block";
}

// LOGIN
async function login(){
 userName=user.value;
 await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:userName,pin:pin.value})});
}

// CHAT
async function send(){
 const r=await fetch("/ai",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({prompt:msg.value,userName})});
 const d=await r.json();
 chatBox.innerHTML+=`<div>🧑 ${msg.value}</div><div>🤖 ${d.result}</div>`;
 speechSynthesis.speak(new SpeechSynthesisUtterance(d.result));
}

// VOICE
function voice(){
 const r=new (webkitSpeechRecognition||SpeechRecognition)();
 r.start();
 r.onresult=e=>{msg.value=e.results[0][0].transcript;send();}
}

// SEARCH
async function search(){
 const r=await fetch("/search",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({query:q.value})});
 const d=await r.json();
 results.innerHTML="";
 d.results.forEach(x=>{
  results.innerHTML+=`<div onclick="read('${x.link}')">${x.link}</div>`;
 });
}

// READ + SUMMARIZE
async function read(u){
 const a=await fetch("/fetch-article",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({url:u})});
 const c=await a.json();

 const ai=await fetch("/ai",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({prompt:"Summarize:\n"+c.content,userName})});
 const d=await ai.json();
 summary.innerText=d.result;
}

// QR
function makeQR(){
 qrOut.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrText.value)}">`;
}

// TRANSLATE
async function translate(){
 const r=await fetch("/ai",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({prompt:"Translate to English:\n"+t.value,userName})});
 const d=await r.json();
 tOut.innerText=d.result;
}

// VOICE TRANSLATE
function voiceT(){
 const r=new (webkitSpeechRecognition||SpeechRecognition)();
 r.start();
 r.onresult=e=>{t.value=e.results[0][0].transcript;translate();}
}

// CAMERA
async function loadCams(){
 const devices = await navigator.mediaDevices.enumerateDevices();
 camSelect.innerHTML="";
 devices.forEach(d=>{
  if(d.kind==="videoinput"){
    camSelect.innerHTML+=`<option value="${d.deviceId}">${d.label}</option>`;
  }
 });
}

async function startCam(){
 const stream = await navigator.mediaDevices.getUserMedia({video:{deviceId:camSelect.value}});
 video.srcObject = stream;
}

async function snap(){
 const canvas=document.createElement("canvas");
 const ctx=canvas.getContext("2d");
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 ctx.drawImage(video,0,0);

 const img=canvas.toDataURL();
 const {data}=await Tesseract.recognize(img,"eng");
 camText.innerText=data.text;

 const r=await fetch("/ai",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({prompt:"Translate to English:\n"+data.text,userName})});
 const d=await r.json();
 camTrans.innerText=d.result;
}

// AGENT
async function runAgent(){
 const r=await fetch("/agent/action",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({task:task.value})});
 const d=await r.json();
 agentOut.innerText=JSON.stringify(d,null,2);
}

// SWARM
async function runSwarm(){
 const r=await fetch("/swarm",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({goal:goal.value})});
 const d=await r.json();
 swarmOut.innerText=JSON.stringify(d,null,2);
}

// FILES
async function upload(){
 const fd=new FormData();
 fd.append("file",f.files[0]);
 await fetch("/upload",{method:"POST",body:fd});
}

async function list(){
 const r=await fetch("/files");
 const d=await r.json();
 fileList.innerHTML=d.join("<br>");
}

// API
async function api(){
 const r=await fetch(url.value,{method:"POST",headers:{"Content-Type":"application/json"},body:body.value});
 out.innerText=await r.text();
}

// DASHBOARD
async function loadStats(){
 const r=await fetch("/stats");
 const d=await r.json();
 stats.innerText=JSON.stringify(d,null,2);
}

// AI BRAIN
function runBrain(){
 try{
  eval(brainCode.value);
  alert("AI upgraded");
 }catch(e){
  alert(e.message);
 }
}

// PAY
async function buy(){
 const r=await fetch("/checkout",{method:"POST"});
 const d=await r.json();
 location=d.url;
}

// SERVICE WORKER
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
