<!DOCTYPE html>
<html>
<head>
  <title>AI Platform OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { background:#111;color:white;font-family:Arial;margin:0 }
    #chat { height:50vh;overflow:auto;padding:10px }
    .msg { margin:5px;padding:8px;border-radius:6px }
    .user { background:#333 }
    .ai { background:#1e3a8a }
  </style>
</head>

<body>

<h2 style="text-align:center;">🤖 AI Platform OS</h2>

<!-- LOGIN -->
<div style="text-align:center;">
  <input id="user" placeholder="Name">
  <input id="pin" placeholder="PIN">
  <button onclick="login()">Login</button>
</div>

<div id="chat"></div>

<div style="text-align:center;">
  <input id="msg">
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
  <button onclick="loadMemory()">Load</button>
</div>

<button onclick="openAdmin()">⚙️ Admin</button>

<!-- ADMIN -->
<div id="admin" style="display:none;background:black;padding:10px;">
  <input id="adminPin" placeholder="Admin PIN">
  <button onclick="unlock()">Unlock</button>

  <div id="adminUI" style="display:none;">

    <h3>🌐 Browser</h3>
    <input id="url">
    <button onclick="openSite()">Open</button>
    <button onclick="summarize()">Summarize</button>
    <iframe id="frame" style="width:100%;height:200px;"></iframe>

    <h3>🧪 Postman</h3>
    <select id="method">
      <option>POST</option>
      <option>GET</option>
    </select>
    <input id="endpoint" placeholder="/ai">
    <textarea id="body">{ "prompt":"Hello","userName":"William" }</textarea>
    <button onclick="runAPI()">Send</button>
    <pre id="res"></pre>

    <h3>💻 HTML Runner</h3>
    <textarea id="code"></textarea>
    <button onclick="runHTML()">Run</button>
    <iframe id="preview"></iframe>

    <h3>🧠 Upgrade</h3>
    <textarea id="upgrade"></textarea>
    <button onclick="evalUpgrade()">Inject</button>

  </div>
</div>

<script>
let userName="";

// LOGIN
async function login(){
  userName=document.getElementById("user").value;
  const pin=document.getElementById("pin").value;

  const res=await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:userName,pin})
  });

  alert(await res.text());
}

// SEND
async function send(){
  const text=document.getElementById("msg").value;

  const res=await fetch("/ai",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:text,userName})
  });

  const data=await res.json();

  document.getElementById("chat").innerHTML+=
    `<div class='msg user'>${text}</div>
     <div class='msg ai'>${data.result}</div>`;

  speak(data.result);
}

// MEMORY
async function loadMemory(){
  const res=await fetch("/memory/"+userName);
  const data=await res.json();

  document.getElementById("chat").innerHTML="";
  data.reverse().forEach(x=>{
    document.getElementById("chat").innerHTML+=
      `<div class='msg user'>${x.message}</div>
       <div class='msg ai'>${x.reply}</div>`;
  });
}

// VOICE
function startVoice(){
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.start();
  rec.onresult=e=>{
    document.getElementById("msg").value=e.results[0][0].transcript;
    send();
  };
}
function speak(text){
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// ADMIN
function openAdmin(){document.getElementById("admin").style.display="block";}
function unlock(){
  if(document.getElementById("adminPin").value==="20252025"){
    document.getElementById("adminUI").style.display="block";
  }
}

// BROWSER
function openSite(){
  document.getElementById("frame").src=document.getElementById("url").value;
}

// SUMMARIZE
async function summarize(){
  const url=document.getElementById("url").value;
  const res=await fetch("/ai",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:"Summarize "+url,userName})
  });
  alert((await res.json()).result);
}

// POSTMAN
async function runAPI(){
  const method=document.getElementById("method").value;
  const endpoint=document.getElementById("endpoint").value;
  const body=document.getElementById("body").value;

  let opt={method,headers:{"Content-Type":"application/json"}};
  if(method==="POST") opt.body=body;

  const res=await fetch(endpoint,opt);
  document.getElementById("res").innerText=
    JSON.stringify(await res.json(),null,2);
}

// HTML
function runHTML(){
  document.getElementById("preview").srcdoc=
    document.getElementById("code").value;
}

// UPGRADE
function evalUpgrade(){
  eval(document.getElementById("upgrade").value);
}
</script>

</body>
</html>
