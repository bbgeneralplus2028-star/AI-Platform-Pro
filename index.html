<!DOCTYPE html>
<html>
<head>
  <title>AI Browsing OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { background:#111;color:white;font-family:Arial;margin:0 }
    #chat { height:40vh;overflow:auto;padding:10px }
    .msg { margin:5px;padding:8px;border-radius:6px }
    .user { background:#333 }
    .ai { background:#1e3a8a }
    a { color:#4ea1ff }
  </style>
</head>

<body>

<h2 style="text-align:center;">🤖 AI Browsing OS</h2>

<div id="chat"></div>

<div style="text-align:center;">
  <input id="msg">
  <button onclick="send()">Send</button>
</div>

<hr>

<h3>🌐 AI Search</h3>

<input id="searchBox" placeholder="Search anything...">
<button onclick="searchWeb()">Search</button>

<div id="results"></div>

<h3>🧠 Article Summary</h3>
<pre id="summary"></pre>

<script>
let userName = "William";

// CHAT
async function send(){
  const text = document.getElementById("msg").value;

  const res = await fetch("/ai",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt:text,userName})
  });

  const data = await res.json();

  document.getElementById("chat").innerHTML +=
    `<div class='msg user'>${text}</div>
     <div class='msg ai'>${data.result}</div>`;
}

// SEARCH
async function searchWeb(){
  const query = document.getElementById("searchBox").value;

  const res = await fetch("/search",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({query})
  });

  const data = await res.json();

  const div = document.getElementById("results");
  div.innerHTML = "";

  data.results.forEach(r=>{
    div.innerHTML += `
      <div style="margin:10px;">
        <b>${r.title}</b><br>
        <a href="#" onclick="readArticle('${r.link}')">${r.link}</a>
      </div>
    `;
  });
}

// READ + SUMMARIZE
async function readArticle(url){
  document.getElementById("summary").innerText = "Loading...";

  const article = await fetch("/fetch-article",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({url})
  });

  const content = await article.json();

  const ai = await fetch("/ai",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      prompt: "Summarize this article:\n" + content.content,
      userName
    })
  });

  const result = await ai.json();

  document.getElementById("summary").innerText =
    result.result;
}
</script>

</body>
</html>
