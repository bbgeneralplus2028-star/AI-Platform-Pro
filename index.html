<!DOCTYPE html>
<html>
<head>
  <title>AI Platform Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin:0; font-family:Arial; background:#111; color:white; }

    header { background:#000; padding:15px; text-align:center; font-size:20px; }

    #chat {
      max-width:800px;
      margin:auto;
      padding:10px;
      height:60vh;
      overflow-y:auto;
    }

    .msg { padding:10px; margin:6px; border-radius:8px; }
    .user { background:#333; }
    .ai { background:#1e3a8a; }

    #controls {
      position:fixed;
      bottom:0;
      width:100%;
      background:#000;
      padding:10px;
      text-align:center;
    }

    input {
      padding:10px;
      border-radius:6px;
      border:none;
      margin:5px;
    }

    button {
      padding:10px;
      margin:5px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>🤖 AI Platform Pro</header>

<!-- NAME INPUT -->
<div style="text-align:center; margin:10px;">
  <input id="username" placeholder="Enter your name">
  <button onclick="saveName()">Save Name</button>
  <button onclick="loadMemory()">Load Memory</button>
</div>

<div id="chat"></div>

<div id="controls">
  <input id="msg" placeholder="Type or speak...">
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
  <button onclick="clearMemory()">🧹</button>
</div>

<script>

const API_URL = "/ai";

let userName = localStorage.getItem("userName") || "";
let memory = [];

const chat = document.getElementById("chat");

// ===== RENDER =====
function render(){
  chat.innerHTML = "";
  memory.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg " + m.type;
    div.innerText = m.text;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}

// ===== SAVE NAME =====
function saveName(){
  const nameInput = document.getElementById("username").value.trim();
  if(!nameInput) return;

  userName = nameInput;
  localStorage.setItem("userName", userName);

  alert("Saved: " + userName);
}

// ===== LOAD MEMORY FROM SERVER =====
async function loadMemory(){
  if(!userName){
    alert("Enter name first");
    return;
  }

  const res = await fetch(`/memory/${userName}`);
  const data = await res.json();

  memory = [];

  data.reverse().forEach(item=>{
    memory.push({text:"You: " + item.message, type:"user"});
    memory.push({text:"AI: " + item.reply, type:"ai"});
  });

  render();
}

// ===== TYPEWRITER =====
function typeWriter(text, done){
  let i = 0;
  let current = "";

  const div = document.createElement("div");
  div.className = "msg ai";
  chat.appendChild(div);

  function typing(){
    if(i < text.length){
      current += text.charAt(i);
      div.innerText = "AI: " + current;
      i++;
      setTimeout(typing, 15);
    } else {
      done();
    }
  }

  typing();
}

// ===== SEND =====
async function send(textOverride){
  const input = document.getElementById("msg");
  const text = textOverride || input.value.trim();
  if(!text) return;

  memory.push({text:"You: " + text, type:"user"});
  input.value="";
  render();

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        prompt: text,
        userName: userName
      })
    });

    const data = await res.json();
    const reply = data.result || "No response";

    typeWriter(reply, ()=>{
      memory.push({text:"AI: " + reply, type:"ai"});
    });

    speak(reply);

  }catch(err){
    memory.push({text:"Error: " + err.message, type:"ai"});
    render();
  }
}

// ===== VOICE =====
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

function startVoice(){
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Voice not supported");
    return;
  }

  const rec = new SpeechRecognition();
  rec.start();

  rec.onresult = function(e){
    const voiceText = e.results[0][0].transcript;
    send(voiceText);
  };
}

// ===== CLEAR =====
function clearMemory(){
  memory = [];
  render();
}

// ===== INSTALL =====
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "📱 Install App";

  btn.onclick = ()=> deferredPrompt.prompt();

  document.body.appendChild(btn);
});

// ===== SERVICE WORKER =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}

</script>

</body>
</html>
