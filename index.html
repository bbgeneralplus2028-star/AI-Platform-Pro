<!DOCTYPE html>
<html>
<head>
  <title>AI Platform Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin:0; font-family:Arial; background:#111; color:white; }
    header { background:#000; padding:15px; text-align:center; font-size:20px; }

    #chat {
      max-width:800px;
      margin:auto;
      padding:10px;
      height:65vh;
      overflow-y:auto;
    }

    .msg { padding:10px; margin:6px; border-radius:8px; }
    .user { background:#333; }
    .ai { background:#1e3a8a; }

    #controls {
      position:fixed;
      bottom:0;
      width:100%;
      background:#000;
      padding:10px;
      text-align:center;
    }

    input {
      width:55%;
      padding:10px;
      border-radius:6px;
      border:none;
    }

    button {
      padding:10px;
      margin:5px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>🤖 AI Platform Pro</header>

<div id="chat"></div>

<div id="controls">
  <input id="msg" placeholder="Type or speak...">
  <button onclick="send()">Send</button>
  <button onclick="startVoice()">🎤</button>
  <button onclick="clearMemory()">🧹</button>
</div>

<script>
const API_URL = "/ai";
let memory = JSON.parse(localStorage.getItem("chatMemory") || "[]");
const chat = document.getElementById("chat");

// ===== RENDER =====
function render(){
  chat.innerHTML = "";
  memory.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type;
    div.innerText=m.text;
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
}
render();

// ===== SAVE =====
function save(){
  localStorage.setItem("chatMemory", JSON.stringify(memory));
}

// ===== TYPEWRITER EFFECT =====
function typeWriter(text, callback){
  let i = 0;
  let current = "";

  const div = document.createElement("div");
  div.className = "msg ai";
  chat.appendChild(div);

  function typing(){
    if(i < text.length){
      current += text.charAt(i);
      div.innerText = "AI: " + current;
      i++;
      setTimeout(typing, 15);
    } else {
      callback();
    }
  }

  typing();
}

// ===== SEND =====
async function send(textOverride){
  const input = document.getElementById("msg");
  const text = textOverride || input.value.trim();
  if(!text) return;

  memory.push({text:"You: "+text, type:"user"});
  input.value="";
  render();
  save();

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt:text})
    });

    const data = await res.json();
    const reply = data.result || "No response";

    typeWriter(reply, ()=>{
      memory.push({text:"AI: "+reply, type:"ai"});
      save();
    });

    speak(reply);

  }catch(e){
    memory.push({text:"Error: "+e.message, type:"ai"});
    render();
  }
}

// ===== VOICE OUTPUT =====
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

// ===== VOICE INPUT =====
function startVoice(){
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Voice not supported");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang="en-US";
  rec.start();

  rec.onresult = function(e){
    const voiceText = e.results[0][0].transcript;
    document.getElementById("msg").value = voiceText;
    send(voiceText);
  };
}

// ===== CLEAR =====
function clearMemory(){
  memory = [];
  save();
  render();
}

// ===== INSTALL BUTTON =====
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.createElement("button");
  btn.innerText = "📱 Install App";

  btn.onclick = ()=>{
    deferredPrompt.prompt();
  };

  document.body.appendChild(btn);
});
</script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</body>
</html>
